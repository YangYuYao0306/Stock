<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>扫雷游戏</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #eef2ff, #f8fafc); font-family: Arial, Helvetica, sans-serif; color: #111827;
    }
    .wrap { background: white; padding: 22px; border-radius: 18px; box-shadow: 0 18px 45px rgba(0,0,0,.14); width: max-content; max-width: 96vw; overflow: auto; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 18px; margin-bottom: 14px; }
    .title { font-size: 24px; font-weight: 800; }
    .status { margin-top: 4px; font-size: 14px; color: #4b5563; }
    .controls { display: flex; gap: 8px; align-items: center; }
    select, button { border: 1px solid #d1d5db; border-radius: 10px; padding: 8px 10px; font-size: 14px; background: white; cursor: pointer; }
    button { background: #111827; border-color: #111827; color: white; font-weight: 700; }
    .info { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .card { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 10px 12px; text-align: center; }
    .label { font-size: 12px; color: #6b7280; margin-bottom: 3px; }
    .value { font-size: 22px; font-weight: 800; }
    .board { display: grid; gap: 2px; background: #9ca3af; border: 3px solid #9ca3af; border-radius: 12px; overflow: hidden; width: max-content; }
    .cell {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      border: none; background: #d1d5db; font-size: 18px; font-weight: 900; cursor: pointer;
      transition: background .12s ease, transform .06s ease;
    }
    .cell:hover { background: #c4cad3; }
    .cell.open { background: #f3f4f6; cursor: default; }
    .cell.flagged { background: #fde68a; }
    .cell.mine-open { background: #fecaca; }
    .cell.flash-mine { animation: flashMine .24s ease-in-out 3; }
    .cell.flash-safe { animation: flashSafe .18s ease-in-out 2; }
    @keyframes flashMine {
      0%,100% { background: #d1d5db; transform: scale(1); }
      50% { background: #ef4444; color: white; transform: scale(1.09); }
    }
    @keyframes flashSafe {
      0%,100% { background: #f3f4f6; transform: scale(1); }
      50% { background: #bfdbfe; transform: scale(1.05); }
    }
    .n1 { color: #2563eb; } .n2 { color: #16a34a; } .n3 { color: #dc2626; } .n4 { color: #7c3aed; }
    .n5 { color: #b45309; } .n6 { color: #0891b2; } .n7 { color: #111827; } .n8 { color: #6b7280; }
    .hint { margin-top: 14px; font-size: 13px; color: #4b5563; line-height: 1.55; max-width: 760px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">扫雷</div>
        <div id="status" class="status">左键打开，右键插旗，左右键同时点击数字检查周围 8 格</div>
      </div>
      <div class="controls">
        <select id="difficulty">
          <option value="9,9,10">初级 9×9 / 10 雷</option>
          <option value="16,16,40">中级 16×16 / 40 雷</option>
          <option value="16,30,99">高级 16×30 / 99 雷</option>
        </select>
        <button id="restart">重开</button>
      </div>
    </div>

    <div class="info">
      <div class="card"><div class="label">剩余雷数</div><div id="mineCount" class="value">10</div></div>
      <div class="card"><div class="label">用时</div><div id="timer" class="value">0</div></div>
      <div class="card"><div class="label">状态</div><div id="face" class="value">🙂</div></div>
    </div>

    <div id="board" class="board"></div>

    <div class="hint">
      左键：打开格子。右键：插旗 / 取消旗。<br>
      左右键同时点击已经打开的数字格：检查它周围正向和斜向接壤的 8 个未打开格子。如果有雷，那些雷格会闪红但不会直接爆炸；如果没有雷，会自动打开这些格子并显示数字。
    </div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const mineCountEl = document.getElementById('mineCount');
    const timerEl = document.getElementById('timer');
    const faceEl = document.getElementById('face');
    const restartBtn = document.getElementById('restart');
    const difficultySelect = document.getElementById('difficulty');

    let rows = 9, cols = 9, totalMines = 10;
    let board = [];
    let gameOver = false;
    let firstClick = true;
    let openedCount = 0;
    let flaggedCount = 0;
    let timer = 0;
    let timerId = null;

    function init() {
      [rows, cols, totalMines] = difficultySelect.value.split(',').map(Number);
      gameOver = false;
      firstClick = true;
      openedCount = 0;
      flaggedCount = 0;
      timer = 0;
      clearInterval(timerId);
      timerId = null;
      timerEl.textContent = '0';
      mineCountEl.textContent = totalMines;
      faceEl.textContent = '🙂';
      statusEl.textContent = '左键打开，右键插旗，左右键同时点击数字检查周围 8 格';

      board = Array.from({ length: rows }, (_, r) =>
        Array.from({ length: cols }, (_, c) => ({ r, c, mine: false, open: false, flag: false, number: 0, el: null }))
      );

      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${cols}, 34px)`;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          board[r][c].el = cell;

          cell.addEventListener('click', (e) => handleLeftClick(r, c, e));
          cell.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            handleRightClick(r, c);
          });
          cell.addEventListener('mousedown', (e) => {
            if (e.buttons === 3) {
              e.preventDefault();
              handleChordClick(r, c);
            }
          });
          cell.addEventListener('mouseup', (e) => {
            if (e.button === 0 || e.button === 2) e.preventDefault();
          });

          boardEl.appendChild(cell);
        }
      }
    }

    function startTimer() {
      if (timerId) return;
      timerId = setInterval(() => {
        timer++;
        timerEl.textContent = timer;
      }, 1000);
    }

    function neighbors(r, c) {
      const arr = [];
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) arr.push(board[nr][nc]);
        }
      }
      return arr;
    }

    function placeMines(safeR, safeC) {
      const forbidden = new Set([`${safeR},${safeC}`]);
      neighbors(safeR, safeC).forEach(n => forbidden.add(`${n.r},${n.c}`));

      let placed = 0;
      while (placed < totalMines) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        const key = `${r},${c}`;
        if (board[r][c].mine || forbidden.has(key)) continue;
        board[r][c].mine = true;
        placed++;
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          board[r][c].number = neighbors(r, c).filter(n => n.mine).length;
        }
      }
    }

    function handleLeftClick(r, c, e) {
      if (gameOver) return;
      if (e.buttons === 3) return;
      const cell = board[r][c];
      if (cell.flag || cell.open) return;

      if (firstClick) {
        placeMines(r, c);
        firstClick = false;
        startTimer();
      }

      if (cell.mine) {
        lose(cell);
        return;
      }
      openCell(cell);
      checkWin();
    }

    function handleRightClick(r, c) {
      if (gameOver) return;
      const cell = board[r][c];
      if (cell.open) return;
      cell.flag = !cell.flag;
      flaggedCount += cell.flag ? 1 : -1;
      renderCell(cell);
      mineCountEl.textContent = totalMines - flaggedCount;
    }

    function handleChordClick(r, c) {
      if (gameOver) return;
      const cell = board[r][c];
      if (!cell.open || cell.number === 0) return;

      const closed = neighbors(r, c).filter(n => !n.open && !n.flag);
      if (closed.length === 0) return;

      const mines = closed.filter(n => n.mine);
      if (mines.length > 0) {
        statusEl.textContent = `周围未打开格子里有 ${mines.length} 个雷，已闪红提示。`;
        mines.forEach(n => flash(n, 'flash-mine'));
      } else {
        statusEl.textContent = '周围未打开格子没有雷，已自动打开。';
        closed.forEach(n => {
          flash(n, 'flash-safe');
          openCell(n);
        });
        checkWin();
      }
    }

    function flash(cell, cls) {
      cell.el.classList.remove(cls);
      void cell.el.offsetWidth;
      cell.el.classList.add(cls);
      setTimeout(() => cell.el.classList.remove(cls), 800);
    }

    function openCell(cell) {
      if (cell.open || cell.flag) return;
      cell.open = true;
      openedCount++;
      renderCell(cell);

      if (cell.number === 0 && !cell.mine) {
        neighbors(cell.r, cell.c).forEach(n => {
          if (!n.open && !n.flag && !n.mine) openCell(n);
        });
      }
    }

    function renderCell(cell) {
      const el = cell.el;
      el.className = 'cell';
      el.textContent = '';

      if (cell.open) {
        el.classList.add('open');
        if (cell.mine) {
          el.classList.add('mine-open');
          el.textContent = '💣';
        } else if (cell.number > 0) {
          el.textContent = cell.number;
          el.classList.add(`n${cell.number}`);
        }
      } else if (cell.flag) {
        el.classList.add('flagged');
        el.textContent = '🚩';
      }
    }

    function lose(triggerCell) {
      gameOver = true;
      clearInterval(timerId);
      faceEl.textContent = '💥';
      statusEl.textContent = '踩雷了，游戏结束。';
      triggerCell.open = true;
      board.flat().forEach(cell => {
        if (cell.mine) cell.open = true;
        renderCell(cell);
      });
    }

    function checkWin() {
      if (openedCount === rows * cols - totalMines) {
        gameOver = true;
        clearInterval(timerId);
        faceEl.textContent = '😎';
        statusEl.textContent = '你赢了！';
        board.flat().forEach(cell => {
          if (cell.mine && !cell.flag) {
            cell.flag = true;
            renderCell(cell);
          }
        });
        flaggedCount = totalMines;
        mineCountEl.textContent = 0;
      }
    }

    restartBtn.addEventListener('click', init);
    difficultySelect.addEventListener('change', init);
    document.addEventListener('contextmenu', e => {
      if (e.target.classList.contains('cell')) e.preventDefault();
    });

    init();
  </script>
</body>
</html>
